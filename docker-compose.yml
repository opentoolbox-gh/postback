services:

  # ── Backup job (runs on a cron schedule inside the container) ───────────────
  postback:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # PostgreSQL connection — point at any external host
      PGHOST: ${PGHOST}
      PGPORT: ${PGPORT:-5432}
      PGDATABASE: ${PGDATABASE}
      PGUSER: ${PGUSER}
      PGPASSWORD: ${PGPASSWORD}

      # Google Drive
      GOOGLE_SERVICE_ACCOUNT_KEY: /secrets/sa_key.json
      GDRIVE_FOLDER_ID: ${GDRIVE_FOLDER_ID}

      # Retention knobs (optional — these are the defaults)
      # KEEP_HOURLY: "6"
      # KEEP_6H: "4"
      # KEEP_DAILY: "28"

      # Slack notifications (optional)
      # SLACK_BOT_TOKEN: "xoxb-..."
      # SLACK_CHANNEL: "#db-alerts"
      # SLACK_NOTIFY_ON: "success,failure"   # start,auth,success,failure,retention

      # Logging: info | debug
      RUST_LOG: ${RUST_LOG:-info}

    volumes:
      # Mount your service account JSON key (read-only)
      - ${SA_KEY_PATH}:/secrets/sa_key.json:ro
      # Temp dump dir (tmpfs keeps it in RAM, never touches disk)
      - type: tmpfs
        target: /tmp/postback

    # postback is a one-shot binary — wrap it in a cron loop
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "postback scheduler starting — running every hour"
        while true; do
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Running backup..."
          /usr/local/bin/postback \
            --db-host $$PGHOST \
            --db-port $$PGPORT \
            --db-name $$PGDATABASE \
            --db-user $$PGUSER \
            --sa-key $$GOOGLE_SERVICE_ACCOUNT_KEY \
            --gdrive-folder-id $$GDRIVE_FOLDER_ID \
            --tmp-dir /tmp/postback
          EXIT_CODE=$$?
          if [ $$EXIT_CODE -ne 0 ]; then
            echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Backup FAILED (exit $$EXIT_CODE)"
          else
            echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Backup OK"
          fi
          sleep 3600
        done
